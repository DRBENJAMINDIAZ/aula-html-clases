<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menú IVA - 40 criterios</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #1d2433;
      --muted: #5f6b7a;
      --line: #d9e0ea;
      --accent: #143f6b;
      --accent-2: #0f6b8f;
      --active: #e7f1fb;
      --shadow: 0 10px 30px rgba(20, 35, 60, 0.12);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { font-family: Arial, Helvetica, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .app { display: grid; grid-template-columns: 360px 1fr; min-height: 100vh; }
    aside { background: var(--panel); border-right: 1px solid var(--line); padding: 18px; position: sticky; top: 0; height: 100vh; overflow: auto; }
    .brand { padding: 8px 4px 16px; border-bottom: 1px solid var(--line); margin-bottom: 14px; }
    .brand h1 { font-size: 22px; line-height: 1.15; margin: 0 0 6px; color: var(--accent); letter-spacing: -0.02em; }
    .brand .count { color: var(--muted); font-size: 13px; }
    .search { width: 100%; border: 1px solid var(--line); border-radius: 12px; padding: 12px 12px; font-size: 14px; margin-bottom: 12px; outline: none; }
    .search:focus { border-color: var(--accent-2); box-shadow: 0 0 0 3px rgba(15,107,143,0.12); }
    .menu { display: flex; flex-direction: column; gap: 8px; padding-bottom: 16px; }
    .menu button { border: 1px solid var(--line); background: #fff; border-radius: 12px; padding: 10px 12px; text-align: left; cursor: pointer; transition: 0.15s ease; color: var(--text); }
    .menu button:hover { transform: translateY(-1px); box-shadow: 0 5px 15px rgba(20,35,60,0.08); border-color: #b9c8d8; }
    .menu button.active { background: var(--active); border-color: var(--accent-2); }
    .code { display: inline-block; font-weight: 700; color: var(--accent); font-size: 13px; margin-bottom: 4px; }
    .menu-title { display: block; font-size: 13px; line-height: 1.3; }
    main { padding: 28px; overflow: auto; }
    .toolbar { display: flex; gap: 10px; justify-content: flex-end; margin-bottom: 16px; flex-wrap: wrap; }
    .toolbar button { border: 1px solid var(--line); background: var(--panel); color: var(--accent); border-radius: 10px; padding: 9px 12px; cursor: pointer; font-weight: 700; }
    .toolbar button:hover { border-color: var(--accent-2); background: var(--active); }
    .content-card { background: var(--panel); border: 1px solid var(--line); border-radius: 18px; box-shadow: var(--shadow); padding: 28px; max-width: 1120px; margin: 0 auto; }
    .content-card h2 { color: var(--accent); margin: 0 0 8px; line-height: 1.2; font-size: 26px; }
    .content-card .subtitle { color: var(--muted); margin: 0 0 20px; font-size: 14px; border-bottom: 1px solid var(--line); padding-bottom: 16px; }
    .legal-text { white-space: pre-wrap; font-family: Georgia, "Times New Roman", serif; font-size: 17px; line-height: 1.72; text-align: justify; }
    .all-mode .criterion-block { padding: 0 0 28px; margin: 0 0 28px; border-bottom: 1px solid var(--line); }
    .all-mode .criterion-block:last-child { border-bottom: 0; margin-bottom: 0; padding-bottom: 0; }
    mark { background: #fff0a8; padding: 0 2px; border-radius: 3px; }
    .hidden { display: none !important; }
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      aside { position: relative; height: auto; max-height: 50vh; }
      main { padding: 16px; }
      .content-card { padding: 20px; }
      .legal-text { font-size: 16px; line-height: 1.65; }
    }
    @media print {
      body { background: #fff; }
      .app { display: block; }
      aside, .toolbar { display: none !important; }
      main { padding: 0; }
      .content-card { box-shadow: none; border: none; border-radius: 0; padding: 0; max-width: none; }
      .legal-text { font-size: 12pt; line-height: 1.45; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="brand">
        <h1>Menú IVA</h1>
        <div class="count">40 criterios</div>
      </div>
      <input id="search" class="search" type="search" placeholder="Buscar criterio" autocomplete="off" />
      <nav id="menu" class="menu" aria-label="Menú de criterios IVA"></nav>
    </aside>
    <main>
      <div class="toolbar">
        <button id="prevBtn" type="button">Anterior</button>
        <button id="nextBtn" type="button">Siguiente</button>
        <button id="showAllBtn" type="button">Ver todos</button>
        <button id="copyBtn" type="button">Copiar texto</button>
        <button id="printBtn" type="button">Imprimir</button>
      </div>
      <section id="content" class="content-card" aria-live="polite"></section>
    </main>
  </div>
  <script>
    const criterios = [{"code": "1/IVA/N", "title": "La contraprestación pagada con acciones o partes sociales por aportaciones en especie a sociedades mercantiles, se considera efectivamente cobrada con la entrega de las mismas.", "text": "1/IVA/N La contraprestación pagada con acciones o partes sociales por aportaciones en especie a sociedades mercantiles, se considera efectivamente cobrada con la entrega de las mismas. El artículo 1o., fracción I de la Ley del IVA establece que están obligadas al pago del IVA, las personas físicas y las morales que en territorio nacional realicen, entre otros actos o actividades, la enajenación de bienes. De conformidad con el artículo 8o. de la Ley del IVA, en relación con el artículo 14, fracción III del CFF, la aportación a una sociedad o asociación se entiende como enajenación. El artículo 11 de la Ley del IVA, señala que la enajenación de bienes se considera efectuada en el momento en el que efectivamente se cobren las contraprestaciones y sobre el monto de cada una de ellas. En este tenor, el artículo 1o.-B de la ley multicitada, dispone que se consideran efectivamente cobradas las contraprestaciones cuando se reciban en efectivo, en bienes o en servicios, aun cuando aquéllas correspondan a anticipos, depósitos o a cualquier otro concepto sin importar el nombre con el que se les designe; o bien, cuando el interés del acreedor queda satisfecho mediante cualquier forma de extinción de las obligaciones que den lugar a las contraprestaciones. Asimismo, se presume en términos del tercer párrafo de dicho artículo, que los títulos de crédito distintos al cheque suscritos a favor de los contribuyentes, por quien adquiere el bien, recibe el servicio o usa o goza temporalmente el bien, constituye una garantía del pago del precio o la contraprestación pactados, así como del IVA correspondiente a la operación de que se trate. Entendiéndose recibidos ambos conceptos por los contribuyentes cuando efectivamente los cobren, o cuando los contribuyentes transmitan a un tercero los documentos pendientes de cobro, excepto cuando dicha transmisión sea en procuración. Por tanto, cuando una sociedad emita acciones o partes sociales a favor del accionista o socio que realizó la aportación en especie, para efectos de la Ley del IVA, dicha contraprestación estará efectivamente cobrada en el momento en que ocurra el primer acto jurídico que le otorgue la calidad de socio o accionista respecto de dicha aportación, en virtud de que la presunción establecida en el artículo 1o.-B, tercer párrafo de la Ley del IVA, no aplica a las acciones o partes sociales, toda vez que constituyen bienes por cuya naturaleza no se entregan en garantía.\n\nOrigen Primer antecedente 2012 Oficio 600-04-02-2012-69615 de 27 de noviembre de 2012, mediante el cual se dan a conocer los criterios normativos aprobados en el cuarto trimestre 2012. Oficio 600-04-022012-69616 de 29 de noviembre de 2012, a través del cual se da a conocer el Boletín 2012, con el número de criterio normativo 99/2012/IVA."}, {"code": "2/IVA/N", "title": "Indemnización por cheque no pagado. El monto de la misma no es objeto del IVA.", "text": "2/IVA/N Indemnización por cheque no pagado. El monto de la misma no es objeto del IVA. El artículo 1o. de la Ley del IVA establece que, están obligados al pago de dicho impuesto las personas físicas y morales que en territorio nacional enajenen bienes, presten servicios independientes, otorguen el uso o goce temporal de bienes o importen bienes o servicios. El artículo 193 de la Ley General de Títulos y Operaciones de Crédito dispone que el librador de un cheque presentado en tiempo y no pagado, por causa imputable al propio librador, resarcirá al tenedor los daños y perjuicios que con ello le ocasione y que en ningún caso, la indemnización será menor del veinte por ciento del valor del cheque. En consecuencia, en el caso de que un cheque librado para cubrir el valor de actos o actividades gravadas por la Ley del IVA, no sea pagado por causas imputables al librador y, por consiguiente, el tenedor reciba la indemnización establecida en el artículo 193 de la Ley General de Títulos y Operaciones de Crédito, dicha indemnización no formará parte de la base para el cálculo del IVA, debido a que esta no deriva del acto o actividad celebrado por el tenedor, sino de la aplicación de la Ley General de Títulos y Operaciones de Crédito.\n\nOrigen Primer antecedente Supuesto 38 Página 24 del Manual de Complementación Legal del IVA 1988, criterios 5.1.4 contenido en el oficio 325-SAT-IV-C-7363 de 23 de septiembre de 1997, a través del cual se emite la Primera Actualización de la Compilación Sustantiva de Impuestos Internos."}, {"code": "3/IVA/N", "title": "Retenciones del IVA. No proceden por servicios prestados como actividad empresarial.", "text": "3/IVA/N Retenciones del IVA. No proceden por servicios prestados como actividad empresarial. El artículo 1o.-A, fracción II, inciso a) de la Ley del IVA establece que las personas morales que reciban servicios personales independientes, o usen o gocen temporalmente bienes prestados u otorgados por personas físicas, están obligadas a retener el impuesto que se les traslade. El artículo 14, último párrafo de la misma ley define que la prestación de servicios independientes tiene la característica de personal cuando no tenga naturaleza de actividad empresarial. Por lo anterior, tratándose de prestación de servicios, la retención del IVA únicamente se efectuará cuando el servicio se considere personal, esto es, que no tenga la característica de actividad empresarial, en términos del artículo 16 del CFF.\n\nOrigen Primer antecedente 25/2001/IVA Oficio 325-SAT-A-31123 de 14 de septiembre de 2001 mediante el cual se da a conocer la nueva Compilación de Criterios Normativos 2001."}, {"code": "4/IVA/N", "title": "Servicios de mensajería y paquetería. No se encuentran sujetos a la retención del IVA.", "text": "4/IVA/N Servicios de mensajería y paquetería. No se encuentran sujetos a la retención del IVA. El artículo 1o.-A, fracción II, inciso c) de la Ley del IVA establece que están obligados a efectuar la retención del impuesto que se les traslade, los contribuyentes personas morales que reciban servicios de autotransporte terrestre de bienes prestados por personas físicas o morales. El artículo 5o., segundo párrafo del CFF dispone que a falta de norma fiscal expresa, se aplicarán supletoriamente las disposiciones del derecho federal común cuando su aplicación no sea contraria a la naturaleza propia del derecho fiscal. El artículo 2o., fracción VII de la Ley de Caminos, Puentes y Autotransporte Federal, determina que los servicios auxiliares son aquéllos que sin formar parte del autotransporte federal de pasajeros, turismo o carga, complementan su operación y explotación. El artículo 52, fracción V de la Ley de Caminos, Puentes y Autotransporte Federal, señala a la mensajería y paquetería como un servicio auxiliar al autotransporte federal. Por lo anterior, se considera que las personas morales que reciben servicios de mensajería o paquetería prestados por personas físicas o morales, no se ubican en el supuesto jurídico establecido en el artículo 1-A, fracción II, inciso c) de la Ley del IVA, respecto de la obligación de efectuar la retención del impuesto que se traslade, ya que dichos servicios de mensajería o paquetería no constituyen un servicio de autotransporte federal de carga, sino un servicio auxiliar de este, de conformidad con la Ley de Caminos, Puentes y Autotransporte Federal.\n\nOrigen Primer antecedente 138/2004/IVA Oficio 325-SAT-IV-B-92423 de 17 de diciembre de 2004, mediante el cual se emite la Primera Modificación a la compilación de criterios normativos, Boletín 2004."}, {"code": "5/IVA/N", "title": "Transmisión de deudas. Momento en que se considera efectivamente cobrada la contraprestación y pagado el impuesto.", "text": "5/IVA/N Transmisión de deudas. Momento en que se considera efectivamente cobrada la contraprestación y pagado el impuesto. El artículo 1o.-B, último párrafo de la Ley del IVA establece que cuando con motivo de la enajenación de bienes los contribuyentes reciban documentos o vales, respecto de los cuales un tercero asuma la obligación de pago, se considerará que el valor de las actividades respectivas, así como el IVA correspondiente, fue efectivamente pagado en la fecha en que dichos documentos sean recibidos o aceptados por los contribuyentes. El artículo 2055 del Código Civil Federal señala que el deudor sustituto queda obligado en los términos en que lo estaba el deudor primitivo, asimismo el artículo 2053 del ordenamiento en cita establece que el acreedor que exonera al antiguo deudor, aceptando a otro en su lugar, no puede repetir contra el primero, si el nuevo se encuentra insolvente, salvo pacto en contrario. El artículo 2051 del Código Civil Federal dispone que para que haya sustitución de deudor es necesario que el acreedor consienta expresa o tácitamente, en tanto que el artículo 2052 señala que se presume que el acreedor consiente en la sustitución del deudor, cuando permite que el sustituto ejecute actos que deba ejecutar el deudor, siempre que lo haga en nombre propio y no por cuenta del deudor primitivo. De la interpretación armónica a los preceptos referidos en los párrafos precedentes, tratándose de enajenación de bienes, cuando un tercero asuma la obligación de pago, se considera que el valor del precio o contraprestación, así como el IVA correspondiente, fue efectivamente pagado en la fecha en que el contribuyente acepte expresa o tácitamente la sustitución del deudor, es decir, se acepte la ejecución por parte del deudor sustituto de las obligaciones que corresponderían al deudor primitivo, salvo pacto en contrario en el que el contribuyente se reserve el derecho de repetir contra el deudor primitivo.\n\nOrigen Primer antecedente 72/2007/IVA Oficio 325-SAT-09-04-B-90015 de 14 de diciembre de 2007, mediante el cual se da a conocer el Boletín 2007."}, {"code": "6/IVA/N", "title": "Enajenación de colmenas polinizadoras.", "text": "6/IVA/N Enajenación de colmenas polinizadoras. El artículo 2o.-A, fracción I, inciso a) de la Ley del IVA establece que para calcular dicho impuesto cuando se enajenan animales y vegetales que no estén industrializados, salvo el hule, perros, gatos y pequeñas especies, utilizadas como mascotas en el hogar, se aplica la tasa del 0% al valor de los mismos. Por lo anterior, la enajenación de colmenas polinizadoras estaría gravada a la tasa del 0%, en el entendido de que se está enajenando al conjunto de abejas como tal y que la colmena, es decir, la caja con marcos o bastidores es tan solo un recipiente. Ello, no obstante, estaría sujeto a la siguiente precisión: I. II. Una colmena normalmente tiene dos partes: la cámara o cámaras de cría y la cámara o cámaras de almacenamiento; estas últimas también son conocidas como alzas para la miel. Tomando en cuenta esta distinción, únicamente estaría gravada a la tasa del 0% la enajenación de los compartimentos con abejas, que corresponderían a la cámara de cría. Los compartimentos adicionales y los marcos o bastidores correspondientes, dado que no serían el recipiente para las abejas sino para consumo o explotación de la miel, estarían gravados a la tasa general.\n\nOrigen Primer antecedente 5.2.11. Oficio 325-SAT-IV-C-5320 de 22 de mayo de 1998. Segunda Actualización de la Compilación de Normatividad Sustantiva de Impuestos Internos."}, {"code": "7/IVA/N", "title": "Enajenación de pieles frescas.", "text": "7/IVA/N Enajenación de pieles frescas. El artículo 2o.-A, fracción I, inciso a) de la Ley del IVA establece que para calcular dicho impuesto cuando se enajenan animales y vegetales que no estén industrializados, salvo el hule, perros, gatos y pequeñas especies, utilizadas como mascotas en el hogar se aplica la tasa del 0% al valor de los mismos. El artículo 6 del Reglamento de dicha ley establece que no están industrializados los animales y vegetales que se presenten cortados, aplanados, en trozos, frescos, salados, secos, refrigerados, congelados o empacados. En este tenor, se considera que no están industrializadas las pieles que se presenten frescas o conservadas de cualquier forma, siempre que no se encuentren precurtidas, curtidas, apergaminadas o preparadas de otra manera.\n\nOrigen Primer antecedente 1996 Oficio 325-A-VII-10975 de 4 de diciembre de 1996, mediante el cual se hace del conocimiento las consideraciones en materia de IVA a la enajenación de pieles sin industrializar de animales."}, {"code": "8/IVA/N", "title": "Medicinas de patente.", "text": "8/IVA/N Medicinas de patente. Para efectos de los artículos 2o.-A, fracción I, inciso b) de la Ley del IVA y 7 de su Reglamento, serán consideradas medicinas de patente, las especialidades farmacéuticas, los estupefacientes, las substancias psicotrópicas y los antígenos y vacunas, incluyendo las homeopáticas y las veterinarias, aun cuando estas puedan ser ingeridas, inyectadas, inhaladas o aplicadas, sin llevar a cabo ningún otro procedimiento de elaboración. En este sentido, la enajenación e importación de cualquier producto que para clasificarse como medicina de patente requiera mezclarse con otras sustancias o productos o sujetarse a un proceso industrial de transformación, como serían las sustancias químicas, deberán gravarse con la tasa general del IVA, aun cuando se incorporen o sean la base para la producción de medicinas de patente.\n\nOrigen Primer antecedente 6/94 Oficio 325-A-VII-21606 de 23 de junio de 1994, a través del cual se dan a conocer diversos criterios de operación y normativos."}, {"code": "9/IVA/N", "title": "Suministro de medicamentos como parte de los servicios de un hospital. Se debe considerar la tasa general del IVA.", "text": "9/IVA/N Suministro de medicamentos como parte de los servicios de un hospital. Se debe considerar la tasa general del IVA. El artículo 2o.-A, fracción I, inciso b) de la Ley del IVA señala que el impuesto se calculará aplicando la tasa del 0% cuando se enajenen medicinas de patente. El artículo 17, segundo párrafo del CFF establece que cuando con motivo de la prestación de un servicio se proporcionen bienes o se otorgue el uso o goce temporal al prestatario, se considerará como ingreso por el servicio o como valor de este, el importe total de la contraprestación a cargo del prestatario, siempre que sean bienes que normalmente se proporcionen o se conceda su uso o goce con el servicio de que se trate. Por tanto, se considera que cuando se proporcionan medicinas de patente como parte de los servicios durante la hospitalización del paciente, directa o vía la contratación de un paquete de atención especial, se encuentran gravados a la tasa del 16% del IVA, de conformidad con lo establecido en los artículos 14, fracción I de la multicitada ley y 17, segundo párrafo del CFF, en virtud de que se trata de la prestación genérica de un servicio y no de la enajenación de medicamentos a que se refiere el artículo 2o.-A, fracción I, inciso b) de la ley en comento.\n\nOrigen Primer antecedente 6/2005/IVA Oficio 325-SAT-09-IV-B-118532 de 19 de septiembre de 2005, mediante el cual se emite la Compilación de Criterios Normativos. Liberación de la primera parte del Boletín 2005."}, {"code": "10/IVA/N", "title": "Productos destinados a la alimentación humana y animal.", "text": "10/IVA/N Productos destinados a la alimentación humana y animal. Para efectos de lo establecido en el artículo 2o.-A, fracción I, inciso b) de la Ley del IVA, se entiende por productos destinados a la alimentación, aquéllos que sin requerir transformación o industrialización adicional, se ingieren como tales por humanos o animales para su alimentación, aunque al prepararse por el consumidor final se cuezan o combinen con otros productos destinados a la alimentación humana y animal. La enajenación de los insumos o materias primas que se incorporen, dentro de un procedimiento de industrialización o transformación, a productos destinados a la alimentación humana y animal, ha estado afecta a la tasa del 0% siempre que dichas materias primas o insumos se contemplen en la definición del párrafo anterior. La enajenación de insumos o materias primas, tales como sustancias químicas, colorantes, aditivos o conservadores, que se incorporan al producto alimenticio, está afecta a la tasa general, salvo que se ubiquen en la definición del segundo párrafo de este criterio normativo.\n\nOrigen Primer antecedente 4. Oficio 325-A-VII-10973 de 3 de diciembre de 1996, a través del cual se hacen del conocimiento diversos criterios normativos."}, {"code": "11/IVA/N", "title": "Suplementos alimenticios. No se consideran como productos destinados a la alimentación.", "text": "11/IVA/N Suplementos alimenticios. No se consideran como productos destinados a la alimentación. La finalidad de los suplementos alimenticios es incrementar la ingesta dietética total, complementarla o suplir algunos de sus componentes, pudiendo ser incluso elaborados a base de alimentos tradicionales. En efecto, los suplementos alimenticios están elaborados con una mezcla de productos de diversa naturaleza (químicos, hierbas, extractos naturales, vitaminas, minerales, etc.) cuya finalidad consiste en otorgarle al cuerpo componentes en niveles superiores a los que obtiene de una alimentación tradicional, siendo su ingesta opcional y en ocasiones contienen advertencias, limitantes o contraindicaciones respecto a su uso o consumo. La Suprema Corte de Justicia de la Nación se ha pronunciado respecto a la razón que llevó al legislador a hacer un distingo entre productos destinados a la alimentación y los demás, para efectos de establecer excepciones y tasas diferenciadas de la Ley del IVA, en el sentido de que el trato diferencial obedece a finalidades extra fiscales como coadyuvar al sistema alimentario mexicano y proteger a los sectores sociales menos favorecidos. Por lo tanto, para efectos de los artículos 2o.-A, fracción I, inciso b) y 25, fracción III de la Ley del IVA, los suplementos alimenticios no se consideran como productos destinados a la alimentación, por lo que no están sujetos a la tasa del 0% en su enajenación, ni exentos en su importación.\n\nOrigen Primer antecedente 2013 Oficio 600-04-02-2013-12915 de 25 de junio de 2013, mediante el cual se dan a conocer los criterios normativos aprobados en el segundo trimestre 2013. Oficio 600-04-072013-16549 de 10 de diciembre de 2013, a través del cual se da a conocer el Boletín 2013, con el número de criterio normativo 121/2013/IVA."}, {"code": "12/IVA/N", "title": "Concepto de leche para efectos del IVA.", "text": "12/IVA/N Concepto de leche para efectos del IVA. El artículo 2o.-A, fracción I, inciso b), numeral 1o. de la Ley del IVA, establece que se aplicará la tasa del 0% a la enajenación de productos destinados a la alimentación humana o animal a excepción de bebidas distintas de la leche, inclusive cuando las mismas tengan la naturaleza de alimentos; conforme a lo anterior, es aplicable la tasa del 0% del IVA a la enajenación de leche. La legislación fiscal no define el concepto de leche; sin embargo, existe regulación tanto sanitaria como comercial que define dicho concepto y establece las especificaciones que deben cumplir los productos para ser considerados leche, por lo que, atendiendo a las características propias de la leche, para efectos de la aplicación de la tasa del 0% a que se refiere el artículo 2o.-A, fracción I, inciso b), numeral 1 de la Ley del IVA, se entiende por leche: I. La secreción natural de las glándulas mamarias de las vacas o de cualquier otra especie animal, excluido el calostro, que cumplan con la regulación sanitaria y comercial que les sea aplicable. Con base en lo anterior, quedan comprendidas las leches en sus diversas denominaciones comerciales, incluida la saborizada, siempre y cuando cumplan con las especificaciones que establecen las Normas Oficiales Mexicanas “NOM-155-SCFI-2012, Leche-Denominaciones, especificaciones fisicoquímicas, información comercial y métodos de prueba” y “NOM-243-SSA1-2010, Productos y servicios. Leche, producto lácteo, producto lácteo combinado, mezcla de leche con grasa vegetal y derivados lácteos. Disposiciones y especificaciones sanitarias. Métodos de prueba” vigentes. II. III. La mezcla de leche con grasa vegetal en sus diversas denominaciones comerciales, incluida la saborizada, siempre y cuando cumplan con las especificaciones establecidas en las Normas Oficiales Mexicanas “NOM-190-SCFI-2012, Mezcla de leche con grasa vegetalDenominaciones, especificaciones fisicoquímicas, información comercial y métodos de prueba” y “NOM-243-SSA1-2010, Productos y servicios. Leche, producto lácteo, producto lácteo combinado, mezcla de leche con grasa vegetal y derivados lácteos. Disposiciones y especificaciones sanitarias. Métodos de prueba” vigentes. La fórmula para lactantes, la fórmula para lactantes con necesidades especiales de nutrición, la fórmula de continuación y la fórmula de continuación para necesidades especiales de nutrición, siempre y cuando cumplan con las especificaciones establecidas en la Norma Oficial Mexicana “NOM-131-SSA1-2012, Productos y servicios. Fórmulas para lactantes, de continuación y para necesidades especiales de nutrición. Alimentos y bebidas no alcohólicas para lactantes y niños de corta edad. Disposiciones y especificaciones sanitarias y nutrimentales. Etiquetado y métodos de prueba” vigente.\n\nOrigen Primer antecedente 2014 Oficio 600-04-07-2014-87379 de 15 de diciembre de 2014, mediante el cual se dan a conocer los criterios normativos aprobados en el cuarto trimestre 2014. Oficio 600-04-072014-87371 de 17 de diciembre de 2014, a través del cual se da a conocer el Boletín 2014, con el número de criterio normativo 13/2014/IVA."}, {"code": "13/IVA/N", "title": "Alimentos preparados.", "text": "13/IVA/N Alimentos preparados. Para los efectos del artículo 2o.-A, fracción I, último párrafo de la Ley del IVA se consideran alimentos preparados para su consumo en el lugar de su enajenación, los alimentos enajenados como parte del servicio genérico de comidas, prestado por hoteles, restaurantes, fondas, loncherías, torterías, taquerías, pizzerías, cocinas económicas, cafeterías, comedores, rosticerías, bares, cantinas, servicios de banquetes o cualesquiera otros de la misma naturaleza, en cualquiera de las modalidades de servicio en el plato, en la mesa, a domicilio, al cuarto, para llevar y autoservicio. Tratándose de establecimientos distintos a los anteriores, como por ejemplo las denominadas tiendas de autoservicio, se considera que prestan el servicio genérico de comidas, únicamente por la enajenación de alimentos preparados o compuestos, listos para su consumo y ofertados a granel, independientemente de que los hayan preparado o combinado, o adquirido ya preparados o combinados. Por consiguiente, la enajenación de dichos alimentos ha estado afecta a la tasa general del IVA. Las enajenaciones de los alimentos mencionados en el párrafo anterior que hagan los proveedores a los establecimientos a que se refiere el citado párrafo, únicamente estarán afectas a la tasa general del impuesto cuando los proveedores presten un servicio genérico de comidas en los términos del primer párrafo.\n\nOrigen Primer antecedente 14/93 Oficio 325-A-VII-24497 de 27 de octubre de 1993."}, {"code": "14/IVA/N", "title": "Alimentos preparados para su consumo en el lugar de su enajenación.", "text": "14/IVA/N Alimentos preparados para su consumo en el lugar de su enajenación. Para efectos del artículo 2o.-A, fracción I, último párrafo de la Ley del IVA, también se consideran alimentos preparados para su consumo en el lugar o establecimiento en que se enajenen, los que resulten de la combinación de aquellos productos que, por sí solos y por su destino ordinario, pueden ser consumidos sin necesidad de someterse a otro proceso de elaboración adicional, cuando queden a disposición del adquirente los instrumentos o utensilios necesarios para su cocción o calentamiento.\n\nOrigen Primer antecedente 2008 Oficio 600-04-02-2008-77249 de 25 de noviembre de 2008, mediante el cual se da a conocer el criterio normativo en materia de IVA. Oficio 600-04-02-2009-73416 de 7 de enero de 2009, a través del cual se da a conocer el Boletín 2008, con número de criterio normativo 10/2008/IVA."}, {"code": "15/IVA/N", "title": "Enajenación de refacciones para equipo agrícola.", "text": "15/IVA/N Enajenación de refacciones para equipo agrícola. El artículo 2o.-A, fracción I, inciso e), último párrafo de la Ley del IVA, establece que se aplicará la tasa del 0% a la enajenación de maquinaria y equipo agrícola, ganadero o de pesca, cuando dichos equipos se enajenen completos. En sentido contrario, los contribuyentes que enajenen refacciones para maquinaria y equipo agrícola, ganadero o de pesca, están obligados al traslado y pago del IVA a la tasa del 16%.\n\nOrigen Primer antecedente 5.2.8. Oficio 102-SAT-13 de 4 de julio de 1997, a través del cual se emite la Compilación de Normatividad Sustantiva de Impuestos Internos."}, {"code": "16/IVA/N", "title": "Equipos integrados a invernaderos hidropónicos.", "text": "16/IVA/N Equipos integrados a invernaderos hidropónicos. El artículo 2o.-A, fracción I, inciso g) de la Ley del IVA establece que la enajenación de invernaderos hidropónicos y equipos integrados a ellos para producir temperatura y humedad controladas o para proteger los cultivos de elementos naturales, está gravada a la tasa del 0%. No obstante, ni las disposiciones fiscales ni el derecho federal común establecen lo que debe entenderse por equipos integrados a invernaderos hidropónicos. En este sentido, para efectos del artículo 2o.-A, fracción I, inciso g) de la Ley del IVA, tendrán el carácter de equipos integrados a invernaderos hidropónicos, los bienes tangibles que tengan o no la calidad de activo fijo de conformidad con la Ley del ISR, que se enajenen conjuntamente con el invernadero hidropónico y así se haga constar en el CFDI correspondiente, siempre que el mencionado invernadero se trate de un producto terminado y los equipos cumplan con su función en conjunto con este. Se entiende que cumplen con su función los bienes señalados cuando su uso en los invernaderos hidropónicos consista en producir la temperatura y la humedad de forma controlada; o bien, proteger los cultivos de elementos naturales. No se considerarán equipos integrados a invernaderos hidropónicos, y por tanto no son sujetos de la tasa del 0% en el IVA, aquellos bienes que, teniendo las características antes mencionadas, se enajenen de manera individual como insumos en la cadena de producción o elaboración, mejora, reparación y/o mantenimiento de los invernaderos hidropónicos, o bien, para optimizar su funcionamiento, aun cuando estos pudieran constituir elementos que componen dichos invernaderos o complementan su función.\n\nOrigen Primer antecedente 2013 Oficio 600-04-07-2013-15282 de 10 de octubre de 2013, mediante el cual se dan a conocer los criterios normativos aprobados en el tercer trimestre 2013. Oficio 600-04-072013-16549 de 10 de diciembre de 2013, a través del cual se da a conocer el Boletín 2013, con el número de criterio normativo 125/2013/IVA."}, {"code": "17/IVA/N", "title": "Libros contenidos en medios electrónicos, táctiles o auditivos. Tratamiento en materia de IVA.", "text": "17/IVA/N Libros contenidos en medios electrónicos, táctiles o auditivos. Tratamiento en materia de IVA. De conformidad con el artículo 2o-A, fracción I, inciso i) de la Ley del IVA, el impuesto se calculará aplicando la tasa del 0% a los valores a que se refiere dicha ley, cuando se enajenen libros, periódicos y revistas, que editen los propios contribuyentes. El artículo 9o., fracción III de la Ley del IVA establece que no se pagará el citado impuesto, tratándose de la enajenación de libros, periódicos y revistas, así como el derecho para usar o explotar una obra, que realice su autor. El artículo 20, fracción V de la Ley del IVA dispone que no se pagará el impuesto por el uso o goce temporal de libros, periódicos y revistas. El referido artículo 2o.-A, fracción I, inciso i) estipula que, para los efectos de la Ley del IVA, se considera libro toda publicación, unitaria, no periódica, impresa en cualquier soporte, cuya edición se haga en un volumen o en varios volúmenes. De igual forma, el artículo en comento señala que, dentro del concepto de libros, no quedan comprendidas aquellas publicaciones periódicas amparadas bajo el mismo título o denominación y con diferente contenido entre una publicación y otra. Por último, señala que se considera que forman parte de los libros, los materiales complementarios que se acompañen a ellos, cuando no sean susceptibles de comercializarse separadamente. Se entiende que no tienen la característica de complementarios cuando los materiales pueden comercializarse independientemente del libro. El artículo 5o., segundo párrafo del CFF determina que a falta de norma fiscal expresa, se aplicarán supletoriamente las disposiciones del derecho federal común cuando su aplicación no sea contraria a la naturaleza propia del derecho fiscal. Por su parte, el artículo 16 de la Ley Federal del Derecho de Autor, establece que las obras podrán hacerse del conocimiento público, entre otros actos, mediante la publicación que se define en la fracción II de dicho artículo como la reproducción de la obra en forma tangible y su puesta a disposición del público mediante ejemplares, o su almacenamiento permanente o provisional por medios electrónicos, que permitan al público leerla o conocerla visual, táctil o auditivamente. De una interpretación armónica de las disposiciones legales antes expuestas, se desprende que la definición del término “libro” establecido en la Ley del IVA y en la Ley Federal del Derecho de Autor, incluye aquellos libros contenidos en medios electrónicos, táctiles y auditivos; en este sentido, para los efectos de los artículos 2o.-A, fracción I, inciso i); 9 fracción III y 20 fracción V de la Ley del IVA, según sea el caso, se aplicará la tasa del 0% o no se pagará dicho impuesto.\n\nOrigen Primer antecedente 17/2002/IVA Oficio 325-SAT-A-31676 de 24 de mayo de 2002."}, {"code": "18/IVA/N", "title": "Cargos entre líneas aéreas.", "text": "18/IVA/N Cargos entre líneas aéreas. El artículo 32 del Reglamento de la Ley del IVA dispone que el servicio de transporte que presta una línea aérea amparado con un boleto expedido por una línea aérea distinta, es la misma prestación de servicios por la cual ya se causó el IVA al expedirse el boleto, por lo que el cargo que la línea aérea que presta el servicio hace por este concepto a la que expidió el boleto, no está sujeto al pago de dicho impuesto. El artículo 2o.-A, fracción II de la misma ley establece de manera limitativa los supuestos para aplicar la tasa 0%, dentro de los cuales no se encuentran los cargos entre líneas aéreas. Por lo tanto, es improcedente la devolución del IVA que soliciten las compañías aéreas que apliquen la tasa del 0% a los cargos entre líneas aéreas. Ello, en virtud de que dichos servicios no están afectos a la mencionada tasa, de conformidad con el artículo 2o.-A, fracción II de la Ley del IVA, sino exentos conforme al artículo 32 de su Reglamento.\n\nOrigen Primer antecedente 8. Oficio 325-A-VII-10960 de 14 de octubre de 1996, a través del cual se hacen de conocimiento los criterios aprobados por el Comité de Normatividad en su sesión No. 21, celebrada el 10 de octubre de 1996."}, {"code": "19/IVA/N", "title": "Prestación de servicios a sociedades dedicadas a actividades agrícolas y ganaderas.", "text": "19/IVA/N Prestación de servicios a sociedades dedicadas a actividades agrícolas y ganaderas. El artículo 2o.-A, fracción II, inciso a) de la Ley del IVA establece que se calculará el impuesto aplicando la tasa del 0%, cuando se presten los servicios a que se refiere ese numeral directamente a los agricultores y ganaderos, siempre que se destinen a actividades agropecuarias. El artículo 11 del Reglamento de dicha Ley señala que se entiende que los servicios se prestan directamente a los agricultores y ganaderos, cuando sea en virtud de contratos celebrados con asociaciones u organizaciones que los agrupen o con alguna institución de crédito que actúe en su carácter de fiduciaria en los que los agricultores, los ganaderos u organizaciones que los agrupen sean fideicomisarios, cuando no se hayan designado fideicomisarios o estos no puedan individualizarse y cuando se trate de fideicomisos de apoyo a dichos agricultores o ganaderos. El artículo 16, fracciones III y IV y último párrafo del CFF, dispone que empresa es la persona física o moral que realiza actividades agrícolas y ganaderas, asimismo, el artículo 74, sexto párrafo de la Ley del ISR, señala que se consideran personas morales dedicadas exclusivamente a las actividades agrícolas, ganaderas, pesqueras o silvícolas, aquéllas cuyos ingresos por dichas actividades representan cuando menos el 90% de sus ingresos totales, sin incluir los ingresos por las enajenaciones de activos fijos o activos fijos y terrenos, de su propiedad que hubiesen estado afectos a su actividad. Por su parte, el artículo 113-E, último párrafo de la Ley del ISR, establece que se consideran personas físicas dedicadas exclusivamente a las actividades agrícolas, ganaderas, silvícolas o pesqueras, cuando el total de sus ingresos representan el 100% por estas actividades. De una interpretación armónica de las disposiciones legales antes expuestas se desprende que una empresa, persona física o moral, que realiza actividades agrícolas y ganaderas también gozará de la tasa del 0% a que se refiere el artículo 2o.-A, fracción II, inciso a) de la Ley del IVA, cuando esta reciba directamente los servicios que en el citado inciso se señalan y los mismos sean destinados a actividades agropecuarias.\n\nOrigen Primer antecedente 2014 Oficio 600-04-07-2014-6142 de 14 de agosto de 2014, mediante el cual se dan a conocer de manera anticipada los nuevos criterios normativos aprobados en el tercer trimestre 2014. Oficio 600-04-07-2014-87371 de 17 de diciembre de 2014, a través del cual se da a conocer el Boletín 2014, con el número de criterio normativo 20/2014/IVA."}, {"code": "20/IVA/N", "title": "Prestación de servicios en invernaderos hidropónicos. Aplicación de la tasa del 0%.", "text": "20/IVA/N Prestación de servicios en invernaderos hidropónicos. Aplicación de la tasa del 0%. El artículo 2o.-A, fracción II, inciso d) de la Ley del IVA establece que se calculará dicho impuesto aplicando la tasa del 0%, cuando se presten servicios independientes en invernaderos hidropónicos. Dado lo anterior, el IVA se calculará a la tasa del 0%, únicamente cuando el servicio independiente sea prestado en invernaderos hidropónicos, es decir, en invernaderos que ya están constituidos como tales. Por lo tanto, en términos del artículo 5o. del CFF el supuesto antes señalado no puede ser ampliado o hacerse extensivo a otros casos de prestación de servicios no previstos específicamente en la ley, como aquellos servicios que se lleven a cabo para construir, habilitar o montar dichos invernaderos.\n\nOrigen Primer antecedente 18/2002/IVA Oficio 325-SAT-A-31676 de 24 de mayo de 2002, a través del cual se emite la Primera Actualización de la Compilación Sustantiva de Impuestos Internos."}, {"code": "21/IVA/N", "title": "IVA en importaciones que realice la Federación, los Estados, los Municipios, así como sus organismos descentralizados y las instituciones públicas de seguridad social.", "text": "21/IVA/N IVA en importaciones que realice la Federación, los Estados, los Municipios, así como sus organismos descentralizados y las instituciones públicas de seguridad social. El artículo 3o., segundo párrafo de la Ley del IVA, establece que la Federación, el Distrito Federal, los Estados, los Municipios, así como sus organismos descentralizados y las instituciones públicas de seguridad social, no estarán obligados a pagar el IVA por los actos que realicen que den lugar al pago de derechos. Dentro de este último concepto quedan comprendidos los derechos federales, estatales o municipales. El artículo 49 de la LFD regula el pago del derecho de trámite aduanero por recibir los servicios consistentes en las operaciones que se efectúen utilizando un pedimento o el documento aduanero correspondiente, a que se refiere dicho artículo y no así por el acto de la importación. En ese sentido, la exención del IVA contenida en el segundo párrafo del artículo 3o. de la Ley del IVA, no resulta aplicable al impuesto por las importaciones que realicen la Federación, el Distrito Federal, los Estados, los Municipios, así como sus organismos descentralizados y las instituciones públicas de seguridad social, aun cuando paguen el derecho a que se refiere el párrafo anterior, ya que este se paga por recibir los servicios de trámite aduanero, que son distintos al acto de importación.\n\nOrigen Primer antecedente IV/95 Boletín de Normatividad 1"}, {"code": "22/IVA/N", "title": "Cálculo de la proporción de acreditamiento cuando se realicen actividades exentas a título gratuito.", "text": "22/IVA/N Cálculo de la proporción de acreditamiento cuando se realicen actividades exentas a título gratuito. Conforme a la Ley del IVA cuando el contribuyente utilice indistintamente bienes, servicios o el uso o goce temporal de bienes, para realizar las actividades gravadas a la tasa general o a la del 0% y, además para realizar otras actividades por las que obtenga ingresos, el acreditamiento procederá únicamente en la proporción en la que el valor de las actividades por las que deba pagarse el impuesto o a las que se aplique la tasa de 0%, represente en el valor total de las actividades mencionadas que el contribuyente realice en el mes de que se trate. El artículo 15, fracción III, de la Ley del IVA establece, que no se pagará IVA por los servicios prestados en forma gratuita, excepto cuando los beneficiarios sean los miembros, socios o asociados de la persona moral. El artículo 34 de la Ley de referencia, en su primer párrafo dispone que, cuando la contraprestación que cobre el contribuyente por la enajenación de bienes, la prestación de servicios o el otorgamiento del uso o goce temporal de bienes, no sea en efectivo ni en cheques, sino total o parcialmente en otros bienes o servicios, se considerará como valor de estos el de mercado o en su defecto el de avalúo. Los mismos valores se tomarán en cuenta tratándose de actividades por las que se deba pagar el impuesto establecido en la Ley, cuando no exista contraprestación. De la interpretación armónica a los preceptos antes señalados es de concluir que tratándose de las actividades por las que no se debe pagar el impuesto (exentas) que sean a título gratuito, para efecto solamente de calcular la proporción de acreditamiento, se considerará como valor de estas el de mercado o en su defecto el de avalúo.\n\nOrigen Primer antecedente 2013 Oficio 600-04-02-2013-11156 de 22 de abril de 2013, mediante el cual se dan a conocer los criterios normativos aprobados en el primer trimestre 2013. Oficio 600-04-072013-16549 de 10 de diciembre de 2013, a través del cual se da a conocer el Boletín 2013, con el número de criterio normativo 131/2013/IVA."}, {"code": "23/IVA/N", "title": "Saldos a favor del IVA. El remanente de un saldo a favor, si este último previamente se acreditó contra un pago posterior a la declaración en la que se determinó, debe seguirse acreditando hasta agotarlo.", "text": "23/IVA/N Saldos a favor del IVA. El remanente de un saldo a favor, si este último previamente se acreditó contra un pago posterior a la declaración en la que se determinó, debe seguirse acreditando hasta agotarlo. El artículo 6o., primer párrafo de la Ley del IVA, establece que cuando en la declaración de pago resulte saldo a favor, el contribuyente únicamente podrá acreditarlo contra el impuesto a su cargo que le corresponda en los meses siguientes hasta agotarlo o solicitar su devolución. En ese sentido, no es factible la acumulación de remanentes de saldos a favor pendientes de acreditar, toda vez que el esquema es de pagos mensuales y definitivos conforme lo previsto en el artículo 5o.-D de la Ley del IVA, por lo que se considera que en los casos en que los contribuyentes después de haber determinado un saldo a favor, acrediten el mismo en una declaración posterior, resultándoles un remanente, deberán seguir acreditándolo hasta agotarlo, sin que en dicho caso sea procedente su devolución.\n\nOrigen Primer antecedente 52/2003/IVA Oficio 325-SAT-IV-F-84632 de 28 de noviembre de 2003, mediante el cual se emite la Compilación de Criterios Normativos. Se dan a conocer criterios."}, {"code": "24/IVA/N", "title": "Reembolsos o reintegros en especie. Constituyen enajenación.", "text": "24/IVA/N Reembolsos o reintegros en especie. Constituyen enajenación. El artículo 8o. de la Ley del IVA dispone que se considera que hay enajenación para los efectos de dicha ley, lo que señala el CFF. El artículo 14, fracción I del Código en cita establece que se entenderá como enajenación toda transmisión de propiedad, aún en la que el enajenante se reserve el dominio del bien enajenado. Por lo tanto, están obligadas al traslado y pago del IVA a la tasa del 16%, las empresas concesionarias de bienes o servicios que, al decretarse su disolución y liquidación, reintegren bienes al Gobierno Federal como reembolso del haber social previamente aportado a las mismas, ya que conforme a lo previsto por el artículo 14, fracción I del CFF, dichas operaciones constituyen una enajenación.\n\nOrigen Primer antecedente 5.2.7. Oficio 102-SAT-13 de 4 de julio de 1997, a través del cual se emite la Compilación de Normatividad Sustantiva de Impuestos Internos."}, {"code": "25/IVA/N", "title": "Enajenación de piedra, arena y tierra. No son bienes inmuebles.", "text": "25/IVA/N Enajenación de piedra, arena y tierra. No son bienes inmuebles. El artículo 9o., fracción I de la Ley del IVA señala que no se pagará el citado impuesto tratándose de la enajenación de suelo. Aplicando supletoriamente la legislación del derecho federal común, por suelo debe entenderse el bien inmueble señalado en el artículo 750, fracción I del Código Civil Federal. Por ello, a la enajenación de piedra, arena o tierra, no le es aplicable el desgravamiento previsto en dicho artículo 9o., fracción I de la Ley del IVA, ya que no son bienes inmuebles.\n\nOrigen Primer antecedente 5.2.10. Oficio 325-SAT-IV-C-5320 de 22 de mayo de 1998. Segunda Actualización de la Compilación de Normatividad Sustantiva de Impuestos Internos."}, {"code": "26/IVA/N", "title": "Enajenación de casa habitación. La disposición que establece que no se pagará el IVA no abarca a servicios parciales en su construcción.", "text": "26/IVA/N Enajenación de casa habitación. La disposición que establece que no se pagará el IVA no abarca a servicios parciales en su construcción. El artículo 9o., fracción II de la Ley del IVA establece que no se pagará dicho impuesto en la enajenación de construcciones adheridas al suelo destinadas o utilizadas para casa habitación. Asimismo, el artículo 29 del Reglamento de dicha ley señala que quedan comprendidos dentro de la exención la prestación de servicios de construcción de inmuebles destinados a casa habitación, la ampliación de estas y la instalación de casas prefabricadas que sean utilizadas para ese fin, siempre que el prestador del servicio proporcione la mano de obra y los materiales. Por lo anterior, los trabajos de instalaciones hidráulicas, sanitarias, eléctricas, de cancelería de fierro o aluminio y, en general, cualquier labor que los constructores de inmuebles contraten con terceros para realizarlos o incorporarlos a inmuebles y construcciones nuevas destinadas a casa habitación, no se encuentran incluidos en la exención prevista en el artículo 9o., fracción II de la mencionada ley y 29 de su reglamento, ya que dichos servicios por sí mismos no constituyen la ejecución misma de una construcción adherida al suelo, ni implican la edificación de dicho inmueble.\n\nOrigen Primer antecedente 26/2001/IVA Oficio 325-SAT-A-31123 de 14 septiembre de 2001, mediante el cual se da a conocer la nueva Compilación de Criterios Normativos 2001."}, {"code": "27/IVA/N", "title": "Exención. Comisiones por el otorgamiento de créditos hipotecarios para vivienda.", "text": "27/IVA/N Exención. Comisiones por el otorgamiento de créditos hipotecarios para vivienda. El artículo 15, fracción I de la Ley del IVA, establece que no se pagará dicho impuesto por las comisiones y otras contraprestaciones que cubra el acreditado a su acreedor con motivo del otorgamiento de créditos hipotecarios para la adquisición, ampliación, construcción o reparación de bienes inmuebles destinados a casa habitación, salvo aquéllas que se originen con posterioridad a la autorización del citado crédito o que se deban pagar a terceros por el acreditado. De acuerdo con la disposición citada, no quedan comprendidas en la exención referida las comisiones y otras contraprestaciones que cubra el acreditado a su acreedor con algún motivo distinto del otorgamiento de los créditos mencionados, ni aquéllas que pague con motivo del otorgamiento de dichos créditos, pero que se originen con posterioridad a la autorización de los mismos créditos. A contrario sensu, las comisiones y contraprestaciones que cubra el acreditado a su acreedor por causa del otorgamiento de los créditos mencionados y que se originen hasta el momento de su autorización, quedan comprendidas en la exención. Ahora bien, el numeral 15 en comento no señala como requisito para la procedencia de la exención que se trate de comisiones y contraprestaciones que deban pagarse a más tardar al momento de la autorización de los créditos, sino que sólo requiere que el acreditado las pague con motivo del otorgamiento de dichos créditos y que se originen hasta el momento de su autorización. En consecuencia, para los efectos del artículo 15, fracción I de la Ley del IVA, no se pagará dicho impuesto por las comisiones y otras contraprestaciones que cubra el acreditado a su acreedor con motivo del otorgamiento de los créditos antes mencionados, que tengan su origen en el otorgamiento de dichos créditos, aunque estas se deban pagar o efectivamente se paguen con posterioridad a la autorización de los mismos créditos.\n\nOrigen Primer antecedente 2012 Oficio 600-04-02-2012-57567 de 23 de julio de 2012, mediante el cual se dan a conocer los criterios normativos aprobados en el primer semestre 2012. Oficio 600-04-022012-69616 de 29 de noviembre de 2012, a través del cual se da a conocer el Boletín 2012, con el número de criterio normativo 123/2012/IVA."}, {"code": "28/IVA/N", "title": "Intereses moratorios.", "text": "28/IVA/N Intereses moratorios. El artículo 15, fracción X de la Ley del IVA establece que no se pagará dicho impuesto por la prestación de servicios por los que derivan intereses, en los casos en que la misma ley señala. Por tanto, ello incluye a los intereses normales como a los intereses moratorios ya que la misma disposición no distingue ni limita dicho concepto.\n\nOrigen Primer antecedente 7. Oficio 325-A-VII-10973 de 3 de diciembre de 1996, a través del cual se hacen del conocimiento diversos criterios normativos."}, {"code": "29/IVA/N", "title": "Intereses en financiamientos de actos gravados a la tasa del 0% o exentos.", "text": "29/IVA/N Intereses en financiamientos de actos gravados a la tasa del 0% o exentos. El artículo 15, fracción X, inciso a) de la Ley del IVA establece que no se pagará dicho impuesto por la prestación de servicios por los que deriven intereses de financiamiento en los casos en los que el enajenante, el prestador de un servicio o el que otorga el uso o goce temporal de bienes proporcione financiamiento relacionado con actos o actividades por los que no se esté obligado al pago de este impuesto o a los que se les aplique la tasa del 0%. Por su parte, el artículo 37 del Reglamento de la Ley del IVA establece que no se estará obligado al pago del impuesto por los intereses derivados de operaciones de financiamiento, aun cuando quien proporcione el financiamiento no sea la misma persona que enajene el bien, siempre que en el contrato correspondiente se condicione el préstamo a la adquisición de un determinado inmueble destinado a casa habitación. Por ello, de la interpretación a contrario sensu y sin perjuicio de lo señalado por el artículo 37 antes citado, si quien otorga el crédito o financiamiento no es el enajenante, el prestador de un servicio o el que otorga el uso o goce temporal de bienes, dicho financiamiento no estará exento, conforme al artículo 15, fracción X, inciso a) de la Ley del IVA, aunque pudiera estarlo conforme a otra disposición de la propia ley.\n\nOrigen Primer antecedente 10. Oficio 325-A-VII-10960 de 14 de octubre de 1996, a través del cual se hacen de conocimiento los criterios aprobados por el Comité de Normatividad en su sesión No. 21, celebrada el 10 de octubre de 1996. Modificación Segunda Resolución de Modificaciones a la RMF 2017 Publicada en el DOF el 18 de julio de 2017, Anexo 7, publicado en el DOF el 21 de julio de 2017."}, {"code": "30/IVA/N", "title": "Propinas. No forman parte de la base gravable del IVA.", "text": "30/IVA/N Propinas. No forman parte de la base gravable del IVA. El artículo 18 de la Ley del IVA establece que para calcular el impuesto tratándose de prestación de servicios, se considerará como valor el total de la contraprestación pactada, así como las cantidades que además se carguen o cobren a quien reciba el servicio por otros impuestos, derechos, viáticos, gastos de toda clase, reembolsos, intereses normales o moratorios, penas convencionales y cualquier otro concepto. El artículo 346 de la Ley Federal del Trabajo indica que las propinas son parte del salario de los trabajadores, por lo que los patrones no podrán reservarse ni tener participación alguna en ellas. De la interpretación armónica a los preceptos en cita se desprende que las remuneraciones que se perciben por concepto de propina no forman parte de la base gravable del IVA por la prestación de servicios; lo anterior, ya que el prestador de los servicios, el patrón, no puede reservarse participación alguna sobre las propinas al ser parte del salario de los trabajadores.\n\nOrigen Primer antecedente 108/2004/IVA Oficio 325-SAT-IV-B-91597 de 31 de agosto de 2004, mediante el cual se emite la liberación de la primera parte del Boletín 2004."}, {"code": "31/IVA/N", "title": "IVA. Base del impuesto por la prestación del servicio de emisión de vales y monederos electrónicos.", "text": "31/IVA/N IVA. Base del impuesto por la prestación del servicio de emisión de vales y monederos electrónicos. El artículo 18, primer párrafo de la Ley del IVA establece que para calcular dicho impuesto, tratándose de prestación de servicios, se considerará como valor el total de la contraprestación pactada, así como las cantidades que además se carguen o cobren a quien recibe el servicio por otros impuestos, derechos, viáticos, gastos de toda clase, reembolsos, intereses normales o moratorios, penas convencionales y cualquier otro concepto. Por lo anterior, tratándose del servicio de emisión de vales y monederos electrónicos la base, el valor, para los efectos del IVA, deberá ser el monto de la contraprestación por el servicio de emisión de vales y monederos electrónicos, conocida como comisión, sin incluir el importe o valor nominal de los vales y monederos electrónicos. En este sentido, para calcular la base del IVA los prestadores del servicio de emisión de vales y monederos electrónicos deberán considerar como valor el total de la contraprestación pactada por la prestación del servicio de emisión de vales y monederos electrónicos conocida como comisión, excluyendo el importe o valor nominal de los vales y monederos electrónicos.\n\nOrigen Primer antecedente 2010 Oficio 600-04-02-2010-68009 de 26 de julio de 2010, mediante el cual se dan a conocer los criterios normativos aprobados en el primer semestre 2010. Oficio 600-04-022010-69707 de 17 de diciembre de 2010, a través del cual se autoriza el Boletín 2010, con el número de criterio normativo 99/2010/IVA."}, {"code": "32/IVA/N", "title": "IVA. Está exenta la importación de mercancías gravadas a la tasa del 0%.", "text": "32/IVA/N IVA. Está exenta la importación de mercancías gravadas a la tasa del 0%. De conformidad con el artículo 25, fracción III de la Ley del IVA, no se pagará el IVA en las importaciones de bienes cuya enajenación en el país y de servicios prestados en territorio nacional, no den lugar al pago de dicho impuesto o cuando sean de los señalados en el artículo 2o.-A de la mencionada ley. El artículo 2o.-A del citado ordenamiento señala diversos bienes y servicios cuya enajenación o prestación en territorio nacional están gravados con la tasa 0%, en la cual no se establece dicha tasa para la importación de los referidos bienes o servicios. Por lo tanto, en las operaciones de importación no resulta aplicable la tasa del 0% prevista en el artículo 2o.-A de la Ley del IVA, ya que si bien es cierto el artículo 25 del citado ordenamiento remite al artículo 2o.-A, dicha remisión es únicamente para identificar las mercancías que se podrán importar sin el pago del citado impuesto y no para efectos de aplicar la tasa 0%.\n\nOrigen Primer antecedente 39/2003/LA Compilación de Criterios Normativos, Boletín Electrónico octubre 2003, Tomo III."}, {"code": "33/IVA/N", "title": "Disposición aplicable para determinar las importaciones de oro por las cuales no se pagará IVA.", "text": "33/IVA/N Disposición aplicable para determinar las importaciones de oro por las cuales no se pagará IVA. El artículo 25, fracción III de la Ley del IVA establece que no se pagará dicho impuesto en la importación de bienes cuya enajenación en el país no dé lugar al pago del mismo o, esté afecto a la tasa del 0%. Sin embargo, la tasa del 0% y la exención en las enajenaciones de oro y de productos hechos a base de oro, están condicionadas a su venta al mayoreo y no con el público en general, en el caso del artículo 2o.-A, fracción I, inciso h) de la misma ley, o a su venta al menudeo y con el público en general, conforme al artículo 9o., fracción VIII de la Ley del IVA. Por lo que dichas condicionantes, por su propia naturaleza, son incompatibles con el concepto de importación y sólo pueden entenderse o realizarse en el caso de enajenaciones. En consecuencia, de la interpretación estricta a la ley, dichas condicionantes excluyen la aplicación del artículo 25, fracción III, en relación con el 2o.-A, fracción I, inciso h) y 9o., fracción VIII de la Ley del IVA. Por otra parte, la fracción VII del mencionado artículo 25, exenta la importación de oro cuyo contenido mínimo sea del 80%, sin ninguna condicionante. Por lo tanto, está exenta del IVA la importación de oro con un contenido mínimo de dicho material del 80%, de conformidad con lo previsto en el artículo 25, fracción VII de la ley, no así la importación de los demás productos previstos en los artículos 2o.-A, fracción I, inciso h) y 9o., fracción VIII, debido a que no cumplen con los requisitos indicados en el artículo 25, fracción III de la ley de la materia.\n\nOrigen Primer antecedente 5.2.6. Oficio 102-SAT-13 de 4 de julio de 1997, a través del cual se emite la Compilación de Normatividad Sustantiva de Impuestos Internos."}, {"code": "34/IVA/N", "title": "Pago y acreditamiento del IVA por importaciones, cuando las actividades del importador estén gravadas a la tasa del 0%.", "text": "34/IVA/N Pago y acreditamiento del IVA por importaciones, cuando las actividades del importador estén gravadas a la tasa del 0%. De conformidad con los artículos 28 de la Ley del IVA y 55 de su Reglamento, tratándose de la importación de bienes tangibles, el pago tendrá el carácter de provisional y se hará conjuntamente con el del impuesto general de importación, utilizando la forma por medio de la cual se efectúe el pago de este último. Tratándose de las empresas que importan maquinaria y equipo no producidos en el país, para el desarrollo de las funciones propias de su actividad, deberán pagar el IVA que les corresponda, pudiendo acreditarlo en los términos y con los requisitos que establecen los artículos 4o. y 5o. de la ley de la materia, independientemente de que las actividades del importador se encuentren gravadas a la tasa del 0%.\n\nOrigen Primer antecedente V/95 Boletín de Normatividad 1 mayo-junio de 1995."}, {"code": "35/IVA/N", "title": "Tasa del 0% del IVA. Resulta aplicable y no se pagará el IEPS, cuando las mercancías nacionales sean destinadas al régimen de depósito fiscal para su exposición y venta en las tiendas denominadas “Duty Free”.", "text": "35/IVA/N Tasa del 0% del IVA. Resulta aplicable y no se pagará el IEPS, cuando las mercancías nacionales sean destinadas al régimen de depósito fiscal para su exposición y venta en las tiendas denominadas “Duty Free”. El artículo 29, párrafos primero y segundo, fracción I de la Ley del IVA, dispone que las empresas residentes en el país calcularán dicho impuesto aplicando la tasa 0% al valor de la enajenación de los bienes cuando estos se exporten de manera definitiva en términos de la Ley Aduanera. El artículo 119, penúltimo párrafo de la Ley Aduanera establece que a partir de la fecha en que las mercancías nacionales queden en depósito fiscal para su exportación, se entenderá que estas fueron exportadas definitivamente. Por tanto, la mercancía nacional que sea destinada al régimen de depósito fiscal para su exposición y venta en las tiendas denominadas “Duty Free”, se sujetará a la tasa del 0% de IVA y, en su caso, no se pagará el IEPS, conforme al artículo 8o., fracción II de la Ley del IEPS.\n\nOrigen Primer antecedente 30/2003/IVA-IEPS Compilación de Criterios Normativos, Boletín Electrónico octubre 2003, Tomo III."}, {"code": "36/IVA/N", "title": "Seguros. Vehículos de residentes en el extranjero que ingresan temporalmente al país.", "text": "36/IVA/N Seguros. Vehículos de residentes en el extranjero que ingresan temporalmente al país. El artículo 29, fracción IV, inciso e) de la Ley del IVA, dispone que las empresas residentes en el país, calcularán dicho impuesto aplicando la tasa del 0% al valor de la prestación de servicios cuando estos se exporten, dicha tasa es aplicable en el caso de seguros que sean prestados por residentes en el país pero que sean aprovechados en el extranjero. En el caso de servicios de cobertura de seguros en el ramo de automóviles a residentes en el extranjero que ingresan temporalmente a territorio nacional a bordo de sus vehículos, se ampara al vehículo exclusivamente durante su estancia en territorio nacional, es decir, el seguro de referencia rige sólo durante el tiempo en el que el vehículo circule en el país, y es en este tiempo cuando el asegurado recibe los beneficios. Por tanto, no puede considerarse que exista un aprovechamiento del servicio en el extranjero, quedando en consecuencia su prestación sujeta al traslado y pago del impuesto de que se trata a la tasa del 16%, aun cuando el pago de la suma asegurada por haber ocurrido el siniestro previsto en la póliza se efectúe en el extranjero.\n\nOrigen Primer antecedente 5.5.2. Oficio 102-SAT-13 de 4 de julio de 1997, a través del cual se emite la Compilación de Normatividad Sustantiva de Impuestos Internos."}, {"code": "37/IVA/IEPS/N", "title": "Impuestos trasladados. Cuando el contribuyente los pague sin haber realizado el cargo o cobro correspondiente al sujeto económico, podrá obtener beneficios legales sin las exclusiones aplicables a dichos impuestos.", "text": "37/IVA/IEPS/N Impuestos trasladados. Cuando el contribuyente los pague sin haber realizado el cargo o cobro correspondiente al sujeto económico, podrá obtener beneficios legales sin las exclusiones aplicables a dichos impuestos. El artículo 1o., tercer párrafo de la Ley del IVA, así como el artículo 19, fracción II de la Ley del IEPS, establecen la obligación de los contribuyentes a trasladar dichos impuestos, entendiendo por traslado del impuesto el cobro o cargo que el contribuyente debe hacer a las personas que adquieran los bienes, los usen o gocen temporalmente o reciban los servicios, por el monto equivalente del impuesto establecido en dichas leyes. El artículo 66, primer párrafo del CFF prevé la autorización de pago a plazos y el artículo 70-A, párrafos primero y tercero del CFF establece la reducción de multas y recargos. En ambos supuestos los beneficios no pueden otorgarse cuando se trate de contribuciones trasladadas o recaudadas, tal como lo establecen los artículos 66-A, fracción VI, inciso c), párrafo siguiente y 70-A, primer párrafo, ambos del CFF. Del análisis a las disposiciones resumidas en los párrafos anteriores se desprende que los contribuyentes tienen la obligación de realizar el traslado del impuesto en los términos que establecen las propias leyes toda vez que, de no hacerlo, el pago de las contribuciones deberá realizarse directamente o con cargo al patrimonio del contribuyente. En tales consideraciones, el contribuyente que no traslade el impuesto correspondiente a la operación realizada, y lo pague directamente o con su patrimonio, no se encontrará impedido para solicitar la autorización de pago a plazos prevista en el artículo 66, primer párrafo del CFF y la reducción de multas y recargos señalada en el artículo 70-A, primer y tercer párrafos del CFF.\n\nOrigen Primer antecedente Segunda Resolución de Modificaciones a la RMF para 2015 Publicada en el DOF el 14 de mayo de 2015, Anexo 7, publicado en el DOF el 21 de mayo de 2015."}, {"code": "38/IVA/N", "title": "Enajenación de sal tasa aplicable en IVA.", "text": "38/IVA/N Enajenación de sal tasa aplicable en IVA. El artículo 2o.-A, fracción I, inciso b), numeral 4 de la Ley del IVA, establece que se calculará el impuesto aplicando la tasa del 0%, a la enajenación de productos destinados a la alimentación con excepción de los aditivos alimenticios. Por su parte, el criterio normativo 10/IVA/N Productos destinados a la alimentación humana y animal, establece que se entiende por productos destinados a la alimentación, tratándose de aditivos, aquellos que, sin requerir transformación o industrialización adicional, se ingieren como tales por humanos o animales para su alimentación, aunque al prepararse por el consumidor final se cuezan o combinen con otros productos destinados a la alimentación. Según sus características se define a la sal, como un producto constituido por cloruro de sodio y que proviene exclusivamente de fuentes naturales. En ese sentido, la sal no obstante de ser un aditivo alimenticio, es un producto destinado a la alimentación que puede consumirse por humanos o animales de manera directa o combinada con otros productos destinados a la alimentación, y por tanto su enajenación en territorio nacional está gravada a la tasa del 0% del IVA, independientemente de que el adquiriente la utilice en alguna industria diversa a la alimenticia. Este criterio no aplica a la sal para uso industrial no alimenticio prevista en el artículo 3.28 de la NOM-040-SSA1-1993.\n\nOrigen Primer antecedente RMF para 2018 Publicada en el DOF el 22 de diciembre de 2017, Anexo 7, publicado en el DOF el 29 de diciembre de 2017."}, {"code": "39/IVA/N", "title": "Rollos de película o acolchados plásticos. No son herbicidas ni plaguicidas.", "text": "39/IVA/N Rollos de película o acolchados plásticos. No son herbicidas ni plaguicidas. El artículo 2o.-A, fracción I, inciso f), de la Ley del IVA, establece que se aplicará la tasa del 0% del impuesto en la enajenación de herbicidas, entre otros productos, siempre que estén destinados para ser utilizados en la agricultura. El artículo 5o., primer párrafo del CFF, establece que las disposiciones fiscales que establezcan cargas a los particulares son de aplicación estricta, considerando que establecen cargas las normas que se refieren al sujeto, objeto, base, tasa o tarifa. El numeral 2.4 de la Norma Oficial Mexicana “NOM-033-FITO-1995 publicada en el DOF el 24 de junio de 1996, por la que se establecen los requisitos y especificaciones fitosanitarias para el aviso de inicio de funcionamiento que deberán cumplir las personas físicas o morales interesadas en comercializar plaguicidas agrícolas”, establece que un plaguicida es un “insumo fitosanitario destinado a prevenir, repeler, combatir y destruir a los organismos biológicos nocivos a los vegetales, tales como: insecticidas, fungicidas, herbicidas, acaricidas, molusquicidas, nematicidas y rodenticidas”. El Reglamento en Materia de Registros, Autorizaciones de Importación y Exportación y Certificados de Exportación de Plaguicidas, Nutrientes Vegetales y Sustancias y Materiales Tóxicos o Peligrosos, publicado en el DOF el 28 de diciembre de 2004 y modificado mediante Decreto publicado en el mismo órgano de difusión oficial el 13 de febrero de 2014, en el artículo 2, fracciones XXXVIII y XLI, establece las siguientes definiciones: “XXXVIII. Plaguicida, cualquier sustancia o mezcla de sustancias que se destine a controlar cualquier plaga, incluidos los vectores que transmiten las enfermedades humanas y de animales, las especies no deseadas que causen perjuicio o que interfieran con la producción agropecuaria y forestal, así como las substancias defoliantes y las desecantes”; “XLI. Plaguicida de uso agrícola, el plaguicida formulado de uso directo en vegetales que se destina a prevenir, repeler, combatir y destruir los organismos biológicos nocivos a estos”. Por otra parte, existen en el mercado rollos de película o acolchados plásticos que son productos sintéticos consistentes en una película de polietileno de baja densidad y polietileno lineal de baja densidad que se utilizan, entre otras funciones, como técnica de cultivo para cubrir el suelo y protegerlo de los agentes atmosféricos, actuando como una barrera física que se extiende sobre las líneas de cultivo o surcos, lo cual bloquea los rayos solares para impedir el desarrollo de la maleza, evita la evaporación de la humedad y reduce los cambios de temperatura, con lo que se obtienen mejores resultados en las cosechas, ya que al incrementar la temperatura del suelo permite un tiempo de cosecha menor y aumentan el rendimiento de la superficie cosechada, mejoran la aireación del suelo, optimizan el rendimiento de los fertilizantes, los plaguicidas y del agua de riego, reduciendo la cantidad necesaria de los mismos, entre otros usos. Conforme a lo expuesto, se desprende que un herbicida es una especie o categoría de plaguicida, y un plaguicida de uso agrícola tiene como elemento esencial sustancia o mezcla de sustancias que se destinan a prevenir, repeler, combatir y destruir los organismos biológicos nocivos a los vegetales, en tanto que conforme a la descripción de los rollos de película o acolchados plásticos, se trata de un plástico que sirve de barrera física que impide la transmisión de rayos solares, por lo que su naturaleza es distinta a la de los herbicidas, ya que no se trata de sustancia o mezcla de sustancias que destruyan organismos biológicos o cumplan con los demás fines mencionados con antelación, razón por la cual no quedan comprendidos en la definición genérica de plaguicida, ni dentro de la especifica de herbicida. Por lo tanto, la enajenación de rollos de película o acolchados de plástico para uso agrícola, se encuentra afecta a la tasa general del IVA, por no ubicarse en el supuesto a que se refiere el artículo 2o.-A, fracción I, inciso f), de la Ley del IVA.\n\nOrigen Primer antecedente Tercera Resolución de Modificaciones a la RMF para 2018 Publicada en el DOF el 19 de octubre de 2018, Anexo 7, publicado en la misma fecha de la Modificación."}, {"code": "40/IVA/N", "title": "Servicios Digitales. Definición de servicios de intermediación para los efectos de lo dispuesto en el artículo 18-B, fracción II de la Ley del IVA.", "text": "40/IVA/N Servicios Digitales. Definición de servicios de intermediación para los efectos de lo dispuesto en el artículo 18-B, fracción II de la Ley del IVA. El artículo 18-B de la Ley del IVA, dispone que únicamente se consideran servicios digitales los establecidos en dicho precepto legal, cuando estos son proporcionados mediante aplicaciones o contenidos en formato digital a través de Internet u otra red, fundamentalmente automatizados, pudiendo o no requerir una intervención humana mínima, siempre que por los mismos se cobre una contraprestación. Por su parte, el artículo 18-B, fracción II de la Ley del IVA, precisa como servicio digital los de intermediación entre terceros que sean oferentes de bienes o servicios y los demandantes de los mismos. La legislación fiscal actualmente no define el concepto de servicio digital de intermediación; sin embargo, conforme a lo señalado en la exposición de motivos de la iniciativa que dio origen al régimen de prestación de servicios digitales, se estableció que para el caso de dichos servicios de intermediación entre terceros que son, por un lado, oferentes de bienes o servicios y, por otro, los demandantes de dicha oferta, el elemento común es que el prestador del servicio de intermediación contrata con el vendedor del bien o el prestador de servicios, ofertar los bienes y servicios a través de su página de Internet, aplicación u otra red digital y, en algunos casos cobrar por su cuenta el precio correspondiente a quien adquiere el bien o contrata el servicio, obteniendo por ello una comisión. En este sentido, para los efectos del artículo 18-B, fracción II de la Ley del IVA, una persona física o moral presta servicios digitales de intermediación cuando usa o habilita una aplicación o cualquier otra red digital para que, mediante la interacción entre dos o más clientes o participantes (generalmente demandantes y oferentes), estos expresen su consentimiento para enajenar y adquirir un bien, prestar y recibir un servicio u otorgar y recibir el uso o goce temporal de un bien, que se caracteriza por que tanto los demandantes como los oferentes que interactúan, son usuarios de plataformas digitales y los oferentes contratan los servicios con el prestador de servicios de intermediación, con el objeto o fin de que estos acuerden la enajenación de un bien, la prestación de un servicio o el uso o goce temporal de un bien, a cambio de un precio o contraprestación. Por lo anterior, de una interpretación armónica y teleológica de las disposiciones fiscales en materia de servicios digitales, se considera que las plataformas digitales prestan servicios de intermediación cuando a cambio del pago de un precio o una contraprestación, ofrezcan o permitan a través de su página de Internet, de su aplicación o cualquier otra red digital, que sus clientes oferten a terceros, bienes o servicios y, que dichos oferentes y demandantes acuerden a través de la plataforma digital las condiciones de dichas operaciones y el precio o contraprestación de las mismas. Lo anterior, se actualiza aún en los casos en que las plataformas digitales que prestan los servicios digitales de intermediación manifiesten: I. II. Que únicamente constituyen tiendas en línea (página de Internet, aplicación u otra red digital), no obstante que, además de ofertar y enajenar bienes de su propiedad o prestar servicios directamente a demandantes de bienes y servicios a través de dichas tiendas, ponen en contacto a otros oferentes de bienes o servicios con los demandantes de los mismos, o Que los servicios o bienes ofertados son responsabilidad exclusiva de los oferentes de estos y que dichas plataformas no intervienen en la negociación, fijación del precio y condiciones del servicio, ostentándose únicamente como agregadores en línea, empresas de redes de transporte o cualquier otra denominación. En este sentido, cualquier plataforma digital que preste servicios digitales de intermediación para que, a través de su página de Internet, de su aplicación o cualquier otra red digital, los oferentes de bienes o servicios acuerden o contraten con demandantes de los mismos las condiciones y precios o contraprestaciones de los servicios o bienes ofrecidos, se considera que presta servicios de intermediación entre terceros, en términos del artículo 18-B, fracción II de la Ley del IVA y, por lo tanto, dichas plataformas de servicios digitales de intermediación, deberán cumplir con las obligaciones previstas en el Capítulo III BIS y el artículo 1-A BIS de la Ley del IVA, en el Título IV, Capitulo II, Sección III de la Ley del ISR, en los artículos 25, primer párrafo, fracciones VI y IX de la LIF, así como en los artículos 2o., fracción II, incisos B), segundo párrafo y D), 5-A BIS y 20-A de la Ley del IEPS, incluyendo las de efectuar retenciones de los impuestos, cuando así resulte procedente en los términos de las disposiciones fiscales mencionadas."}];
    let current = 0;
    let showAll = false;
    let query = '';
    const menu = document.getElementById('menu');
    const content = document.getElementById('content');
    const search = document.getElementById('search');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const showAllBtn = document.getElementById('showAllBtn');
    const copyBtn = document.getElementById('copyBtn');
    const printBtn = document.getElementById('printBtn');
    function escapeHtml(value) {
      return String(value).replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;').replaceAll("'", '&#039;');
    }
    function highlight(value) {
      const safe = escapeHtml(value);
      if (!query.trim()) return safe;
      const term = query.trim().replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return safe.replace(new RegExp(term, 'gi'), match => `<mark>${match}</mark>`);
    }
    function renderMenu() {
      const q = query.toLowerCase().trim();
      menu.innerHTML = '';
      criterios.forEach((c, index) => {
        const haystack = (c.code + ' ' + c.title + ' ' + c.text).toLowerCase();
        const visible = !q || haystack.includes(q);
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = index === current && !showAll ? 'active' : '';
        btn.innerHTML = `<span class="code">${escapeHtml(c.code)}</span><span class="menu-title">${highlight(c.title)}</span>`;
        btn.onclick = () => { current = index; showAll = false; showAllBtn.textContent = 'Ver todos'; render(); };
        if (!visible) btn.classList.add('hidden');
        menu.appendChild(btn);
      });
    }
    function renderContent() {
      if (showAll) {
        content.classList.add('all-mode');
        content.innerHTML = criterios.map(c => `<article class="criterion-block"><h2>${escapeHtml(c.code)}</h2><p class="subtitle">${escapeHtml(c.title)}</p><div class="legal-text">${highlight(c.text)}</div></article>`).join('');
        return;
      }
      content.classList.remove('all-mode');
      const c = criterios[current];
      content.innerHTML = `<h2>${escapeHtml(c.code)}</h2><p class="subtitle">${escapeHtml(c.title)}</p><div class="legal-text">${highlight(c.text)}</div>`;
    }
    function render() { renderMenu(); renderContent(); }
    search.addEventListener('input', () => { query = search.value; render(); });
    prevBtn.addEventListener('click', () => { showAll = false; showAllBtn.textContent = 'Ver todos'; current = (current - 1 + criterios.length) % criterios.length; render(); });
    nextBtn.addEventListener('click', () => { showAll = false; showAllBtn.textContent = 'Ver todos'; current = (current + 1) % criterios.length; render(); });
    showAllBtn.addEventListener('click', () => { showAll = !showAll; showAllBtn.textContent = showAll ? 'Ver uno' : 'Ver todos'; render(); });
    copyBtn.addEventListener('click', async () => {
      const text = showAll ? criterios.map(c => c.text).join('\n\n') : criterios[current].text;
      try { await navigator.clipboard.writeText(text); copyBtn.textContent = 'Copiado'; setTimeout(() => copyBtn.textContent = 'Copiar texto', 1200); }
      catch (e) { const area = document.createElement('textarea'); area.value = text; document.body.appendChild(area); area.select(); document.execCommand('copy'); area.remove(); copyBtn.textContent = 'Copiado'; setTimeout(() => copyBtn.textContent = 'Copiar texto', 1200); }
    });
    printBtn.addEventListener('click', () => window.print());
    render();
  </script>
</body>
</html>
